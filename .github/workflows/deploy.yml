name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'    # triggers on: git tag v1.0.0 && git push --tags

env:
  REGISTRY: ghcr.io

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging          # configured in GitHub → Settings → Environments
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.15.0'

      - name: Configure kubeconfig (Minikube / cloud cluster)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install trading-platform ./helm/trading-services \
            --namespace trading-staging \
            --create-namespace \
            -f ./helm/trading-services/values-staging.yaml \
            --set global.image.tag=${{ github.ref_name }} \
            --set global.image.registry=${{ env.REGISTRY }} \
            --set global.image.repository=${{ github.repository }} \
            --set secrets.jwtSecret="${{ secrets.JWT_SECRET }}" \
            --atomic \
            --timeout 5m

      - name: Verify staging rollout
        run: |
          kubectl rollout status deployment/auth-service -n trading-staging --timeout=120s
          kubectl rollout status deployment/market-service -n trading-staging --timeout=120s

  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production        # REQUIRES manual approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl + Helm
        uses: azure/setup-kubectl@v3
      - uses: azure/setup-helm@v3

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy to production via Helm
        run: |
          helm upgrade --install trading-platform ./helm/trading-services \
            --namespace trading-prod \
            --create-namespace \
            -f ./helm/trading-services/values-prod.yaml \
            --set global.image.tag=${{ github.ref_name }} \
            --set global.image.registry=${{ env.REGISTRY }} \
            --set global.image.repository=${{ github.repository }} \
            --set secrets.jwtSecret="${{ secrets.JWT_SECRET }}" \
            --atomic \
            --timeout 10m

      - name: Verify production rollout
        run: |
          for svc in auth-service market-service order-service portfolio-service wallet-service payment-service; do
            kubectl rollout status deployment/$svc -n trading-prod --timeout=180s
          done
