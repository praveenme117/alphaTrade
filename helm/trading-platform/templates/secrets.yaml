apiVersion: v1
kind: Secret
metadata:
  name: trading-secrets
  labels:
    app: trading-platform
type: Opaque
stringData:
  db-password: {{ .Values.dbPassword | quote }}
  jwt-secret: {{ .Values.jwt.secret | quote }}
  groq-api-key: {{ .Values.assistant.groqApiKey | quote }}
  qdrant-api-key: {{ .Values.assistant.qdrantApiKey | quote }}
