name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─── Unit Tests gate (fast, no Docker) ───────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run all unit tests
        run: mvn test -B --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 14

  # ─── Helm deploy to k3s / kind cluster ───────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: unit-tests
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" > ~/.kube/config

      - name: Deploy infrastructure (Kafka, Redis)
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm upgrade --install trading-kafka bitnami/kafka \
            --namespace trading --create-namespace \
            --set replicaCount=1 \
            --set persistence.enabled=false \
            -f helm/values-staging.yaml --wait --timeout=5m || true
          helm upgrade --install trading-redis bitnami/redis \
            --namespace trading \
            --set auth.enabled=false \
            --set master.persistence.enabled=false \
            --wait --timeout=3m || true

      - name: Deploy microservices
        run: |
          IMAGE_TAG=sha-$(echo ${{ github.sha }} | head -c 7)
          helm upgrade --install trading-platform ./helm/trading-platform \
            --namespace trading \
            --set global.imageTag=$IMAGE_TAG \
            --set global.registry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            --set global.imagePullSecret=ghcr-secret \
            -f helm/values-staging.yaml \
            --wait --timeout=10m

      - name: Verify deployment
        run: |
          kubectl get pods -n trading
          kubectl rollout status deployment/auth-service -n trading
          kubectl rollout status deployment/market-service -n trading

  # ─── Production deploy (requires manual approval) ─────────────
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production    # GitHub environment protection rules = manual approval gate

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl + Helm
        uses: azure/setup-kubectl@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig (prod)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config

      - name: Deploy to production
        run: |
          IMAGE_TAG=sha-$(echo ${{ github.sha }} | head -c 7)
          helm upgrade --install trading-platform ./helm/trading-platform \
            --namespace trading \
            --set global.imageTag=$IMAGE_TAG \
            --set global.registry=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }} \
            -f helm/values-prod.yaml \
            --wait --timeout=15m

      - name: Post-deploy smoke test
        run: |
          sleep 30
          kubectl get pods -n trading
          curl -f http://${{ secrets.GATEWAY_URL }}/actuator/health || exit 1
