{{- if .Values.services.authService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: {{ .Values.services.authService.replicas }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecret }}
      containers:
        - name: auth-service
          image: {{ .Values.global.registry }}/auth-service:{{ .Values.global.imageTag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.services.authService.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.databases.auth | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.dbUsername | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: db-password
            - name: TRADING_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: jwt-secret
          resources: {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.services.authService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.services.authService.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: {{ .Values.services.authService.port }}
      targetPort: {{ .Values.services.authService.port }}
  type: ClusterIP
{{- end }}
